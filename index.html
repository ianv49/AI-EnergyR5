<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sim Data Summary</title>
  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div id="simSummary" class="w-full max-w-md bg-white rounded-xl shadow-lg p-6">
      <h1 class="text-2xl font-bold text-blue-600 mb-4">Sim Data Summary</h1>
      <p class="text-gray-500">Loading sim data...</p>
    </div>
  </div>
  
<div id="debugRibbon" class="fixed top-0 left-0 w-full bg-black text-green-400 text-sm p-2 font-mono">
  Debug log: waiting...
</div>

<div class="flex space-x-2 mt-4">
  <button onclick="runStep()" class="px-4 py-2 bg-blue-600 text-white rounded">Next Step</button>
  <button onclick="stopDebug()" class="px-4 py-2 bg-red-600 text-white rounded">Stop</button>
  <button onclick="refreshDebug()" class="px-4 py-2 bg-gray-600 text-white rounded">Refresh</button>
</div>

  <script src="charts.js"></script>
</body>
</html>
