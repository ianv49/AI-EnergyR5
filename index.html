<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-EnergyR5 Dashboard - Summary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="web/charts.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800 min-h-screen font-sans antialiased">
  <!-- Top Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-700 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
            AI-EnergyR5
          </h1>
          <span class="ml-2 text-sm text-gray-500 dark:text-gray-400">(Summary Dashboard)</span>
        </div>
        <!-- Dark mode toggle -->
        <button id="darkToggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all duration-200">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="flex">
    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 z-40 w-64 bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl shadow-2xl transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out lg:static lg:inset-0">
      <!-- Mobile toggle -->
      <button id="mobileToggle" class="lg:hidden p-4 absolute top-20 left-4 bg-white/50 dark:bg-gray-800/50 rounded-lg backdrop-blur-sm">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <div class="p-6 pt-24 lg:pt-6">
        <nav class="space-y-2">
          <a href="#dashboard" class="group flex items-center p-3 rounded-xl bg-indigo-50 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 font-medium shadow-sm group-hover:shadow-md transition-all duration-200">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Dashboard
          </a>
          <a href="#sensors" class="flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 hover:shadow-sm transition-all duration-200">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            Sensors
          </a>
          <a href="#weather" class="flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 hover:shadow-sm transition-all duration-200">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 014 4h3a4 4 0 014 4v1h3v-1a4 4 0 012-3.6M12 12a3 3 0 100-6 3 3 0 000 6z"/>
            </svg>
            Weather
          </a>
          <a href="#analytics" class="flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 hover:shadow-sm transition-all duration-200">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2-2h-2a2 2 0 01-2-2z"/>
            </svg>
            Analytics
          </a>
          <a href="#settings" class="flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300 hover:shadow-sm transition-all duration-200">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.426 1.756 2.924 1.756 3.35 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Settings
          </a>
        </nav>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 lg:ml-64 pt-16 p-6 lg:p-12">
      <!-- Summary Dashboard -->
      <section id="dashboard" class="min-h-screen">
        <!-- Loading indicator -->
        <div id="loading" class="fixed inset-0 bg-slate-50/80 dark:bg-gray-900/80 z-50 flex items-center justify-center">
          <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl animate-pulse-slow">
            <div class="w-16 h-16 border-4 border-indigo-200 dark:border-indigo-800 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-lg font-semibold text-gray-700 dark:text-gray-300">Loading data summaries...</p>
          </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-4 gap-6 mb-8" id="summaryCards">
          <!-- Cards will be populated by JS -->
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
          <!-- Irradiance Line Chart -->
          <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 border border-gray-200 dark:border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white flex items-center">
              Irradiance Comparison (Last 7 Days)
              <span class="ml-2 px-2 py-1 bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 text-xs rounded-full font-medium">W/m²</span>
            </h2>
            <canvas id="irradianceChart" height="300"></canvas>
          </div>

          <!-- Solar Yield Bar Chart -->
          <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 border border-gray-200 dark:border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white flex items-center">
              Solar Energy Yield Comparison
              <span class="ml-2 px-2 py-1 bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 text-xs rounded-full font-medium">Avg kWh</span>
            </h2>
            <canvas id="yieldChart" height="300"></canvas>
          </div>
        </div>

        <!-- Data Sources Legend -->
        <div class="mt-12 bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 border border-gray-200 dark:border-gray-700">
          <h3 class="text-xl font-bold mb-4 text-gray-900 dark:text-white">Data Sources</h3>
          <div id="legend" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 text-sm">
            <!-- Legend populated by JS -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Dark mode toggle
    const darkToggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    const isDark = localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (isDark) html.classList.add('dark');
    darkToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
    });

    // Mobile sidebar toggle
    const mobileToggle = document.getElementById('mobileToggle');
    const sidebar = document.querySelector('aside');
    mobileToggle.addEventListener('click', () => sidebar.classList.toggle('-translate-x-full'));

    // Smooth scroll
    document.querySelectorAll('nav a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        sidebar.classList.add('-translate-x-full');
        document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
      });
    });

    // Data sources mapping
    const sources = {
      1: { name: 'sim', color: '#3B82F6' },
      2: { name: 'nasa_power', color: '#F59E0B' },
      3: { name: 'open_meteo', color: '#10B981' },
      4: { name: 'solcast', color: '#8B5CF6' },
      5: { name: 'meteostat', color: '#EF4444' },
      6: { name: 'tomorrow', color: '#06B6D4' },
      7: { name: 'weatherbit', color: '#F97316' }
    };

    let allData = {};

    // Parse CSV data
    async function parseData(fileName) {
      try {
        const response = await fetch(`https://raw.githubusercontent.com/ianv49/AI-EnergyR5/main/data/${fileName}`);
        const text = await response.text();
        const lines = text.split('\n').slice(2); // Skip header
        const sourceNum = parseInt(fileName.match(/collect(\d+)\.txt/)[1]);
        const source = sources[sourceNum];
        const data = [];
        let tempSum = 0, irrSum = 0, windMax = 0, yieldSum = 0, count = 0;
        
        for (let line of lines) {
          if (!line.trim()) continue;
const cols = line.split('\t');
          if (cols.length < 9) continue;
          
          const temp = parseFloat(cols[2]);
          const irr = parseFloat(cols[4]);
          const wind = parseFloat(cols[5]);
          const yieldVal = parseFloat(cols[8]);
          
          if (!isNaN(temp) && !isNaN(irr) && !isNaN(wind) && !isNaN(yieldVal)) {
            data.push({timestamp: cols[1], irr, yield: yieldVal});
            tempSum += temp;
            irrSum += irr;
            windMax = Math.max(windMax, wind);
            yieldSum += yieldVal;
            count++;
          }
        }
        
        const avgTemp = (tempSum / count).toFixed(1);
        const avgIrr = (irrSum / count).toFixed(1);
        const avgYield = (yieldSum / count).toFixed(2);
        
        return {
          source,
          data,
          stats: {
            avgTemp,
            avgIrr,
            maxWind: windMax.toFixed(1),
            avgYield: parseFloat(avgYield),
            count
          }
        };
      } catch (e) {
        console.error(`Error loading ${fileName}:`, e);
        return null;
      }
    }

    // Load all data
    async function loadData() {
      const files = ['collect1.txt', 'collect2.txt', 'collect3.txt', 'collect4.txt', 'collect5.txt', 'collect6.txt', 'collect7.txt'];
      const promises = files.map(parseData);
      const results = await Promise.all(promises);
      
      results.forEach(result => {
        if (result) allData[result.source.name] = result;
      });
      
      hideLoading();
      renderSummary();
      renderCharts();
      renderLegend();
    }

    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    function renderSummary() {
      const container = document.getElementById('summaryCards');
      container.innerHTML = '';
      
      let maxYield = 0;
      let bestSource = '';
      
      Object.values(allData).forEach(({source, stats}) => {
        if (stats.avgYield > maxYield) {
          maxYield = stats.avgYield;
          bestSource = source.name;
        }
      });

      Object.entries(allData).forEach(([name, {source, stats}]) => {
        const isBest = name === bestSource;
        const card = `
          <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 border border-gray-200 dark:border-gray-700 hover:shadow-2xl transition-all duration-300 ${isBest ? 'ring-4 ring-emerald-200 dark:ring-emerald-900' : ''}">
            <div class="flex items-center mb-4">
              <div class="w-12 h-12 bg-gradient-to-br ${isBest ? 'from-emerald-400 to-emerald-600' : `from-[${source.color}] to-[${source.color}]`} rounded-2xl p-3 flex-shrink-0 shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
              </div>
              <div class="ml-4">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">${name}</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400">${stats.count.toLocaleString()} rows</p>
              </div>
            </div>
            <div class="space-y-3">
              <div class="flex justify-between items-baseline">
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Avg Temp</span>
                <span class="text-2xl font-bold text-gray-900 dark:text-white">${stats.avgTemp}°C</span>
              </div>
              <div class="flex justify-between items-baseline">
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Avg Irradiance</span>
                <span class="text-2xl font-bold text-orange-600 dark:text-orange-400">${stats.avgIrr} W/m²</span>
              </div>
              <div class="flex justify-between items-baseline">
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Max Wind</span>
                <span class="text-2xl font-bold text-blue-600 dark:text-blue-400">${stats.maxWind} m/s</span>
              </div>
              <div class="flex justify-between items-baseline ${isBest ? 'bg-emerald-50 dark:bg-emerald-900/50 p-3 rounded-xl' : ''}">
                <span class="text-sm font-medium text-gray-500 dark:text-gray-400">Avg Yield</span>
                <span class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">${stats.avgYield} kWh</span>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += card;
      });
    }

    function renderCharts() {
      // Prepare chart data (last 168 hours ~7 days)
      const recentHours = 168;
      const labels = [];
      const datasets = [];

      Object.entries(allData).forEach(([name, {data, source}]) => {
        const recentData = data.slice(-recentHours).reverse();
        const irrData = recentData.map(d => d.irr);
        datasets.push({
          label: name,
          data: irrData,
          borderColor: source.color,
          backgroundColor: source.color + '20',
          tension: 0.4,
          fill: false,
          pointRadius: 0,
          borderWidth: 2
        });
      });

      // Irradiance line chart
      const irrCtx = document.getElementById('irradianceChart').getContext('2d');
      new Chart(irrCtx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' }
          },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: 'W/m²' } }
          }
        }
      });

      // Solar yield bar chart
      const yieldCtx = document.getElementById('yieldChart').getContext('2d');
      const yieldLabels = Object.keys(allData);
      const yieldData = Object.values(allData).map(d => d.stats.avgYield);
      const colors = Object.values(allData).map(d => d.source.color);

      new Chart(yieldCtx, {
        type: 'bar',
        data: {
          labels: yieldLabels,
          datasets: [{
            data: yieldData,
            backgroundColor: colors.map(c => c + 'CC'),
            borderColor: colors,
            borderWidth: 2,
            borderRadius: 8,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: 'Avg kWh' } }
          }
        }
      });
    }

    function renderLegend() {
      const container = document.getElementById('legend');
      container.innerHTML = '';
      Object.entries(allData).forEach(([name, {source}]) => {
        container.innerHTML += `
          <div class="flex items-center space-x-2 p-2 rounded-lg bg-gray-50 dark:bg-gray-800/50">
            <div class="w-4 h-4 rounded-full" style="background-color: ${source.color}"></div>
            <span class="font-medium text-gray-900 dark:text-white">${name}</span>
            <span class="text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded-full">${source.name}</span>
          </div>
        `;
      });
    }

    // Initialize
    loadData();
  </script>
</body>
</html>
