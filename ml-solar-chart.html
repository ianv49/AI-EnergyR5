<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Solar Charts - 14-Day Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    nav { 
      margin-bottom: 20px; 
      font-size: 18px; 
    }
    nav a { 
      margin-right: 15px; 
      text-decoration: none; 
      color: #007bff; 
    }
    nav a:hover { text-decoration: underline; }
    h1 { color: #333; }
    .chart-container { 
      position: relative; 
      height: 400px; 
      width: 100%; 
      margin-bottom: 30px; 
    }
    .chart-row { margin-bottom: 40px; }
    .chart-title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
    @media (max-width: 768px) {
      .chart-container { height: 300px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">← Home</a>
    <a href="ml.html">← ML Table</a>
<a href="ml-solar-chart.html">← Solar</a>
    <a href="ml-chart.html">← Wind Chart</a>
    <a href="ml-dual-chart.html">→ Dual Charts</a>
    <a href="ml-dual-chart.html">→ Dual Charts</a>
  </nav>
  
  <h1>ML Solar Data Charts (Mar 25 - Apr 7)</h1>
  <p>From ml.html Table-2: Historical Mar25-31 (solid), Predictions Apr1-7 (dashed)</p>

  <div class="chart-row">
    <div class="chart-title">Solar Energy Forecast (kWh/m²)</div>
    <div class="chart-container">
      <canvas id="solarChart"></canvas>
    </div>
  </div>

  <script>
    // Exact data from ml.html Table-2 cols 6-8 (1-7 historical, 8-14 predictions)
    const labels = ['Mar 25','Mar 26','Mar 27','Mar 28','Mar 29','Mar 30','Mar 31','Apr 01','Apr 02','Apr 03','Apr 04','Apr 05','Apr 06','Apr 07'];
    
    const solarMin = [0.70, 0.56, 0.84, 0.63, 0.77, 0.52, 0.73, 0.72, 0.65, 0.80, 0.72, 0.65, 0.80, 0.72];
    const solarAvg = [1.00, 0.80, 1.20, 0.90, 1.10, 0.75, 1.05, 1.02, 0.93, 1.15, 1.02, 0.93, 1.15, 1.02];
    const solarMax = [1.30, 1.04, 1.56, 1.17, 1.43, 0.97, 1.36, 1.33, 1.21, 1.49, 1.33, 1.21, 1.49, 1.33];

    // Solid for 1-7 (historical), dashed for 8-14 (predictions)
    function getDashPattern(index) {
      return index < 7 ? [] : [5, 5];
    }

    document.addEventListener('DOMContentLoaded', function() {
      const ctx = document.getElementById('solarChart').getContext('2d');
      
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Solar Min',
              data: solarMin,
              borderColor: '#ff6384',
              backgroundColor: 'rgba(255, 99, 132, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Solar Avg',
              data: solarAvg,
              borderColor: '#36a2eb',
              backgroundColor: 'rgba(54, 162, 235, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Solar Max',
              data: solarMax,
              borderColor: '#ffcd56',
              backgroundColor: 'rgba(255, 205, 86, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: 'Solar Energy (kWh/m²)' }
            },
            x: {
              title: { display: true, text: 'Date (1-7 Historical, 8-14 Predictions)' }
            }
          },
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                title: ctx => ctx[0].label,
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} kWh/m²`
              }
            },
            title: { 
              display: true, 
              text: '14-Day Solar Forecast: Min(red)/Avg(blue)/Max(yellow)' 
            }
          }
        }
      });
      
      console.log('✅ Solar charts: Solid 1-7 historical / Dashed 8-14 predictions');
    });
  </script>
</body>
</html>
