<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Dual Charts - Wind + Solar</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    nav { 
      margin-bottom: 20px; 
      font-size: 18px; 
    }
    nav a { 
      margin-right: 15px; 
      text-decoration: none; 
      color: #007bff; 
    }
    nav a:hover { text-decoration: underline; }
    h1 { color: #333; }
    .chart-container { 
      position: relative; 
      height: 400px; 
      width: 100%; 
      margin-bottom: 30px; 
    }
    .chart-row { margin-bottom: 40px; }
    .chart-title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
    @media (max-width: 768px) {
      .chart-container { height: 300px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">← Home</a>
    <a href="ml.html">← ML Table</a>
<a href="ml-chart.html">← Wind Chart</a>
    <a href="ml-solar-chart.html">← Solar Chart</a>
    <a href="all-ml.html">📊 ML-All</a>
  </nav>
  
  <h1>ML Dual Charts - Wind + Solar (Mar 25 - Apr 7)</h1>
  <p>Exact Table-2 data: Historical Mar25-31 (solid), Predictions Apr1-7 (dashed)</p>

  <div class="chart-row">
    <div class="chart-title">Wind Speed Forecast (m/s)</div>
    <div class="chart-container">
      <canvas id="windChart"></canvas>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-title">Solar Energy Forecast (kWh/m²)</div>
    <div class="chart-container">
      <canvas id="solarChart"></canvas>
    </div>
  </div>

  <script>
    // Exact data from ml.html Table-2 / MLoutput.txt (1-7 historical, 8-14 predictions)
    const labels = ['Mar 25','Mar 26','Mar 27','Mar 28','Mar 29','Mar 30','Mar 31','Apr 01','Apr 02','Apr 03','Apr 04','Apr 05','Apr 06','Apr 07'];
    
    const windMin = [2.80, 2.24, 3.36, 2.52, 3.08, 2.10, 2.94, 2.87, 2.62, 3.21, 2.87, 2.62, 3.21, 2.87];
    const windAvg = [4.00, 3.20, 4.80, 3.60, 4.40, 3.00, 4.20, 4.10, 3.74, 4.59, 4.10, 3.74, 4.59, 4.10];
    const windMax = [5.20, 4.16, 6.24, 4.68, 5.72, 3.90, 5.46, 5.33, 4.86, 5.96, 5.33, 4.86, 5.96, 5.33];

    const solarMin = [0.70, 0.56, 0.84, 0.63, 0.77, 0.52, 0.73, 0.72, 0.65, 0.80, 0.72, 0.65, 0.80, 0.72];
    const solarAvg = [1.00, 0.80, 1.20, 0.90, 1.10, 0.75, 1.05, 1.02, 0.93, 1.15, 1.02, 0.93, 1.15, 1.02];
    const solarMax = [1.30, 1.04, 1.56, 1.17, 1.43, 0.97, 1.36, 1.33, 1.21, 1.49, 1.33, 1.21, 1.49, 1.33];

    // Solid historical (1-7), dashed predictions (8-14)
    function getDashPattern(index) {
      return index < 7 ? [] : [5, 5];
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Wind Chart
      const windCtx = document.getElementById('windChart').getContext('2d');
      new Chart(windCtx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Wind Min',
              data: windMin,
              borderColor: '#ff6384',
              backgroundColor: 'rgba(255, 99, 132, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Wind Avg',
              data: windAvg,
              borderColor: '#36a2eb',
              backgroundColor: 'rgba(54, 162, 235, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Wind Max',
              data: windMax,
              borderColor: '#ffcd56',
              backgroundColor: 'rgba(255, 205, 86, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: 'Wind Speed (m/s)' } },
            x: { title: { display: true, text: 'Date' } }
          },
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: 'Wind: Min(red)/Avg(blue)/Max(yellow)' }
          }
        }
      });

      // Solar Chart
      const solarCtx = document.getElementById('solarChart').getContext('2d');
      new Chart(solarCtx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Solar Min',
              data: solarMin,
              borderColor: '#ff6384',
              backgroundColor: 'rgba(255, 99, 132, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Solar Avg',
              data: solarAvg,
              borderColor: '#36a2eb',
              backgroundColor: 'rgba(54, 162, 235, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Solar Max',
              data: solarMax,
              borderColor: '#ffcd56',
              backgroundColor: 'rgba(255, 205, 86, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: 'Solar Energy (kWh/m²)' } },
            x: { title: { display: true, text: 'Date' } }
          },
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: 'Solar: Min(red)/Avg(blue)/Max(yellow)' }
          }
        }
      });
      
      console.log('✅ Dual charts loaded: Table-2 data aligned');
    });
  </script>
</body>
</html>
