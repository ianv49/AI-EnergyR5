<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Data - TXT Viewer Tabs</title>
    <style>
        body { font-family: 'Courier New', monospace; margin: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        .tabs { display: flex; background: #ddd; border-radius: 8px 8px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 15px; background: #eee; border: none; cursor: pointer; font-size: 16px; transition: all 0.3s; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .tab-btn:hover { background: #ccc; }
        .tab-content { background: white; padding: 20px; min-height: 400px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; white-space: pre-wrap; font-size: 12px; line-height: 1.4; max-height: 600px; overflow-y: auto; }
        .refresh-btn { display: block; margin: 20px auto; padding: 10px 20px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .status { text-align: center; color: #666; font-style: italic; }
        @media (max-width: 768px) { .tabs { flex-direction: column; } .tab-btn { flex: none; } }
    </style>
</head>
<body>
    <h1>📁 collect*.txt Files - Tab Viewer</h1>
    <p class="status">Simple notepad-style viewer | Click tabs to load data/ files | Refresh after backfills</p>
    
    <button class="refresh-btn" onclick="loadAllTabs()">🔄 Load All Tabs</button>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(0)">collect1.txt (Sim)</button>
        <button class="tab-btn" onclick="switchTab(1)">collect2.txt (NASA)</button>
        <button class="tab-btn" onclick="switchTab(2)">collect3.txt (OpenMeteo)</button>
        <button class="tab-btn" onclick="switchTab(3)">collect4.txt</button>
        <button class="tab-btn" onclick="switchTab(4)">collect5.txt (Solcast)</button>
        <button class="tab-btn" onclick="switchTab(5)">collect6.txt</button>
        <button class="tab-btn" onclick="switchTab(6)">collect7.txt</button>
        <button class="tab-btn" onclick="switchTab(7)">collectAll.txt</button>
        <button class="tab-btn" onclick="switchTab(8)">meteostat_feb.txt</button>
        <button class="tab-btn" onclick="switchTab(9)">meteostat_mar.txt</button>
    </div>
    
    <div id="tab-contents" class="tab-content" data-tab="0">
        Loading collect1.txt...
    </div>

    <script>
        const TAB_FILES = [
            'collect1.txt',
            'collect2.txt',
            'collect3.txt',
            'collect4.txt',
            'collect5.txt',
            'collect6.txt',
            'collect7.txt',
            'collectAll.txt',
            'meteostat_feb2026.txt',
            'meteostat_march2026.txt'
        ];

        async function loadTab(file) {
            try {
                const res = await fetch(`data/${file}`);
                if (!res.ok) throw new Error(`File not found: ${res.status}`);
                const text = await res.text();
                return text;
            } catch (e) {
                return `❌ Error loading ${file}: ${e.message}\n\nFile may not exist or backfill needed.`;
            }
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
            const content = document.getElementById('tab-contents');
            content.dataset.tab = index;
            content.innerHTML = `Loading ${TAB_FILES[index]}...`;
            loadTab(TAB_FILES[index]).then(text => content.textContent = text);
        }

        async function loadAllTabs() {
            const promises = TAB_FILES.map(loadTab);
            const contents = await Promise.all(promises);
            TAB_FILES.forEach((file, i) => {
                const div = document.createElement('div');
                div.className = 'tab-content';
                div.dataset.tab = i;
                div.textContent = contents[i];
                document.getElementById('tab-contents').parentNode.appendChild(div);
            });
            switchTab(0);
        }

        window.onload = () => switchTab(0);
    </script>
</body>
</html>
