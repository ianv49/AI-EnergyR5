<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ML-Predict1</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { text-align: center; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #333; color: #fff; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    #predict-date { margin: 20px 0; font-weight: bold; }
  </style>
</head>
<body>
  <h1>ML-Predict1 Results</h1>
  <div id="predict-date">Predict Date: Day 1 of 7 days (2025-04-01)</div>
  <table id="mlres-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Wind Min</th>
        <th>Wind Avg</th>
        <th>Wind Max</th>
        <th>Solar Min</th>
        <th>Solar Avg</th>
        <th>Solar Max</th>
        <th>Source</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadMLres() {
      const response = await fetch("data/MLres1.txt");
      const text = await response.text();
      const lines = text.split("\n").filter(l => l && !l.startsWith("#") && !l.startsWith("["));
      const tbody = document.querySelector("#mlres-table tbody");
      tbody.innerHTML = "";
      lines.forEach(line => {
        const parts = line.split(",");
        if (parts.length === 9) {
          const row = document.createElement("tr");
          parts.forEach(cell => {
            const td = document.createElement("td");
            td.textContent = cell;
            row.appendChild(td);
          });
          tbody.appendChild(row);
        }
      });
    }
    loadMLres();
  </script>
</body>
</html>
