<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ML-Predict1</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { text-align: center; }
    #summary { margin: 20px 0; font-weight: bold; }
    canvas { max-width: 800px; margin: 20px auto; display: block; }
  </style>
</head>
<body>
  <h1>ML-Predict1 Results</h1>
  <div id="summary">Summary and Outlook will appear here...</div>
  <canvas id="chart"></canvas>

  <script>
    async function loadMLres() {
      const response = await fetch("data/MLres1.txt");
      const text = await response.text();
      const lines = text.split("\n").filter(l => l && !l.startsWith("#") && !l.startsWith("["));
      const rows = lines.map(l => l.split(",")).filter(r => r.length === 9 && r[8] === "sim-ML");

      const dates = rows.map(r => r[1]);
      const windAvg = rows.map(r => parseFloat(r[3]));
      const solarAvg = rows.map(r => parseFloat(r[6]));

      // Chart
      new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels: dates,
          datasets: [
            { label: "Wind Avg", data: windAvg, borderColor: "blue", fill: false },
            { label: "Solar Avg", data: solarAvg, borderColor: "orange", fill: false }
          ]
        },
        options: { responsive: true, plugins: { legend: { position: "top" } } }
      });

      // Summary
      const avgWind = (windAvg.reduce((a,b)=>a+b,0)/windAvg.length).toFixed(2);
      const avgSolar = (solarAvg.reduce((a,b)=>a+b,0)/solarAvg.length).toFixed(2);
      document.getElementById("summary").textContent =
        `Outlook: Avg Wind = ${avgWind}, Avg Solar = ${avgSolar} (Apr 1–7, 2025).`;
    }
    loadMLres();
  </script>
</body>
</html>
