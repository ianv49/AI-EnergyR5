<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Wind Charts - 14-Day Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    nav { 
      margin-bottom: 20px; 
      font-size: 18px; 
    }
    nav a { 
      margin-right: 15px; 
      text-decoration: none; 
      color: #007bff; 
    }
    nav a:hover { text-decoration: underline; }
    h1 { color: #333; }
    .chart-container { 
      position: relative; 
      height: 400px; 
      width: 100%; 
      margin-bottom: 30px; 
    }
    .chart-row { margin-bottom: 40px; }
    .chart-title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
    @media (max-width: 768px) {
      .chart-container { height: 300px; }
    }
  </style>
</head>
<body>
  <nav>
<a href="index.html">← Home</a>
    <a href="ml.html">← ML Table</a>
<a href="ml-solar-chart.html">→ Solar Chart</a>
    <a href="ml-dual-chart.html">→ Dual Chart</a>
    <a href="rf-ml.html">📊 ML-RF</a>
  </nav>
  
  <h1>ML Wind Data Charts (Mar 25 - Apr 7)</h1>
  <p>From <code>data/MLoutput.txt</code>: Historical Mar25-31 (solid), Predictions Apr1-7 (dashed)</p>

  <div class="chart-row">
    <div class="chart-title">Wind Speed Forecast (m/s)</div>
    <div class="chart-container">
      <canvas id="windChart"></canvas>
    </div>
  </div>

  <script>
    // Exact data arrays from MLoutput.txt (1-7 historical, 8-14 predictions)
    const labels = ['Mar 25','Mar 26','Mar 27','Mar 28','Mar 29','Mar 30','Mar 31','Apr 01','Apr 02','Apr 03','Apr 04','Apr 05','Apr 06','Apr 07'];
    
    const windMin = [2.80, 2.24, 3.36, 2.52, 3.08, 2.10, 2.94, 2.87, 2.62, 3.21, 2.87, 2.62, 3.21, 2.87];
    const windAvg = [4.00, 3.20, 4.80, 3.60, 4.40, 3.00, 4.20, 4.10, 3.74, 4.59, 4.10, 3.74, 4.59, 4.10];
    const windMax = [5.20, 4.16, 6.24, 4.68, 5.72, 3.90, 5.46, 5.33, 4.86, 5.96, 5.33, 4.86, 5.96, 5.33];

    // Solid for 1-7 (historical), dashed for 8-14 (predictions)
    function getDashPattern(index) {
      return index < 7 ? [] : [5, 5];
    }

    document.addEventListener('DOMContentLoaded', function() {
      const ctx = document.getElementById('windChart').getContext('2d');
      
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Wind Min',
              data: windMin,
              borderColor: '#ff6384',
              backgroundColor: 'rgba(255, 99, 132, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Wind Avg',
              data: windAvg,
              borderColor: '#36a2eb',
              backgroundColor: 'rgba(54, 162, 235, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            },
            {
              label: 'Wind Max',
              data: windMax,
              borderColor: '#ffcd56',
              backgroundColor: 'rgba(255, 205, 86, 0.1)',
              tension: 0.3,
              fill: false,
              pointRadius: 4,
              borderWidth: 2.5,
              borderDash: labels.map((_, i) => getDashPattern(i))
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: 'Wind Speed (m/s)' }
            },
            x: {
              title: { display: true, text: 'Date (1-7 Historical, 8-14 Predictions)' }
            }
          },
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                title: ctx => ctx[0].label,
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} m/s`
              }
            },
            title: { 
              display: true, 
              text: '14-Day Wind Forecast: Min(red)/Avg(blue)/Max(yellow)' 
            }
          }
        }
      });
      
      console.log('✅ Wind charts: Solid 1-7 historical / Dashed 8-14 predictions');
    });
  </script>
</body>
</html>
