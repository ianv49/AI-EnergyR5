[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

minversion = 7.0

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring external services
    slow: Tests that take a long time to run
    api: Tests for API wrappers
    database: Tests for database connectivity
    skip_ci: Skip in CI/CD pipelines

timeout = 300

[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
