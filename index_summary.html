<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Data Summary - All APIs</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 40px auto; background: #f5f5f5; padding: 20px; }
        h1 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; font-weight: bold; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #e8f5e8; }
        .status { font-size: 0.9em; color: #666; }
        .range { font-style: italic; color: #555; }
        .btn-refresh { background: #2196F3; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; display: block; margin: 20px auto; }
        .error { background: #ffebee; color: #c62828; padding: 8px; border-radius: 4px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🌤️ Energy API Data Summary</h1>
    <p style="text-align: center; color: #666;">Row counts & date ranges from data/collect*.txt files | Refresh after backfills</p>
    
    <button class="btn-refresh" onclick="loadSummary()">🔄 Refresh Summary</button>
    
    <table id="summaryTable">
        <thead>
            <tr>
                <th>API/Source</th>
                <th>File</th>
                <th>Row Count</th>
                <th>Date Range</th>
                <th>Status</th>
                <th>Max Irradiance (W/m²)</th>
                <th>Avg Temp (°C)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="7" style="text-align: center;">Click Refresh to load summaries</td></tr>
        </tbody>
    </table>

    <script>
        const FILES = [
            { name: 'Sim Data', file: 'collect1.txt', section: 'sim' },
            { name: 'NASA POWER', file: 'collect2.txt', section: 'nasa_power' },
            { name: 'Open-Meteo', file: 'collect3.txt', section: 'open_meteo' },
            { name: 'collect4', file: 'collect4.txt', section: '' },
            { name: 'Solcast', file: 'collect5.txt', section: 'solcast' },
            { name: 'collect6', file: 'collect6.txt', section: '' },
            { name: 'collect7', file: 'collect7.txt', section: '' },
            { name: 'collectAll', file: 'collectAll.txt', section: '' },
            { name: 'Meteostat Feb', file: 'meteostat_feb2026.txt', section: '' },
            { name: 'Meteostat Mar', file: 'meteostat_march2026.txt', section: '' }
        ];

        async function parseFile(file) {
            try {
                const res = await fetch(`data/${file}`);
                if (!res.ok) return { error: `HTTP ${res.status}` };
                const text = await res.text();
                const lines = text.split('\n');
                
                let rows = 0, minDate = Infinity, maxDate = 0, maxIrr = 0, totalTemp = 0;
                let section = '';
                
                for (let line of lines) {
                    line = line.trim();
                    if (line.match(/\[([^\]]+)\]/)) section = line.slice(1, -1);
                    if (line.match(/# Summary:.*=(\d+)/)) rows = parseInt(line.match(/=(\d+)/)[1]);
                    if (line && !line.match(/^#/) && !line.startsWith('id,') && section) {
                        const parts = line.split(',');
                        if (parts.length >= 6) {
                            const ts = new Date(parts[1]);
                            if (!isNaN(ts)) {
                                minDate = Math.min(minDate, ts);
                                maxDate = Math.max(maxDate, ts);
                            }
                            const temp = parseFloat(parts[2] || 0);
                            const irr = parseFloat(parts[4] || 0);
                            totalTemp += temp;
                            maxIrr = Math.max(maxIrr, irr);
                            rows++;
                        }
                    }
                }
                
                const range = minDate === Infinity ? 'No data' : `${minDate.toISOString().slice(0,7)} to ${new Date(maxDate).toISOString().slice(0,7)}`;
                const avgTemp = rows ? (totalTemp / rows).toFixed(1) : 0;
                
                return {
                    rows,
                    range,
                    maxIrr: maxIrr.toFixed(1),
                    avgTemp,
                    status: '✅ Loaded'
                };
            } catch (e) {
                return { error: e.message, status: '❌ Error' };
            }
        }

        async function loadSummary() {
            const tbody = document.querySelector('#summaryTable tbody');
            tbody.innerHTML = '<tr><td colspan="7">Loading...</td></tr>';
            
            const results = await Promise.all(FILES.map(async ({name, file}) => {
                const data = await parseFile(file);
                return { name, file, ...data };
            }));
            
            tbody.innerHTML = results.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.file}</td>
                    <td><strong>${r.rows || 0}</strong></td>
                    <td class="range">${r.range || 'N/A'}</td>
                    <td>${r.status || r.error}</td>
                    <td>${r.maxIrr || 'N/A'}</td>
                    <td>${r.avgTemp || 'N/A'}</td>
                </tr>
            `).join('');
        }

        window.onload = loadSummary;
    </script>
</body>
</html>
