name: Database Schema Validation

on:
  push:
    paths:
      - 'db/schema.sql'
      - 'db/db_ingest.py'
      - 'db/db_connector.py'
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary

    - name: Validate schema syntax
      run: |
        python -c "
        with open('db/schema.sql', 'r') as f:
            schema = f.read()
        required_keywords = ['CREATE TABLE', 'PRIMARY KEY', 'TIMESTAMP']
        checks = [kw in schema for kw in required_keywords]
        if all(checks):
            print('✓ Schema contains all required SQL keywords')
        else:
            print('✗ Schema validation failed')
            exit(1)
        "

    - name: Test database connection
      env:
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: test_db
      run: |
        python -c "
        import psycopg2
        try:
            conn = psycopg2.connect(
                host='localhost',
                user='postgres',
                password='postgres',
                dbname='test_db'
            )
            print('✓ Database connection successful')
            conn.close()
        except Exception as e:
            print(f'✗ Connection failed: {e}')
        " || true

    - name: Apply schema
      env:
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: test_db
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -f db/schema.sql || true

    - name: Verify tables created
      env:
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: test_db
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -c "\dt" || true
